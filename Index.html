<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Architect - ASIM JUTT EDITS</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 450px; text-align: center; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 28px; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; background: linear-gradient(135deg, #38bdf8, #2563eb); color: white; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
        #output { margin-top: 25px; text-align: left; background: #0f172a; padding: 20px; border-radius: 12px; display: none; border-left: 4px solid #38bdf8; font-size: 14px; line-height: 1.6; }
        .footer { margin-top: 20px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 AI Script Pro</h1>
        <p>Short videos aur Reels ke liye viral scripts hasil karein.</p>
        <input type="text" id="topic" placeholder="Topic yahan likhen (e.g. AI Benefits)">
        <button onclick="generateScript()">Generate Viral Plan</button>

        <div id="output"></div>
        <div class="footer">Developed by <b>ASIM JUTT EDITS</b></div>
    </div>

    <script>
        function generateScript() {
            let topic = document.getElementById('topic').value;
            let output = document.getElementById('output');
            if(topic == "") { alert("Pehle koi topic likhen!"); return; }

            output.style.display = "block";
            output.innerHTML = `
                <b style="color:#38bdf8">📌 TOPIC: ${topic}</b><br><br>
                <b>🪝 THE HOOK:</b><br>"Kya aapko maloom hai ke ${topic} ne duniya ko kaise hairan kar diya hai? Rukye, main batata hoon..."<br><br>
                <b>🎥 SCENE PROMPT:</b><br>"Cinematic 8K portrait of a stylish man using ${topic}, futuristic interface, HDR lighting, professional photography."<br><br>
                <b>📱 HASHTAGS:</b><br>#AI #Trending #2026 #SmartTech #${topic.replace(/\s/g, '')}
            `;
        }
    </script>
</body>
</html>
